name: generated_crew
process: sequential
verbose: true
agents:
  major_festival_researcher:
    role: Search for major music festivals in Hungary 2026
    goal: Identify all major music festivals with 10000+ attendees
    backstory: ''
    model_profile: swarm
    tools:
    - searxng_search
    - webpage_fetch
    allow_delegation: false
    verbose: true
  medium_festival_researcher:
    role: Search for medium music festivals in Hungary 2026
    goal: Identify all medium music festivals with 1000-10000 attendees
    backstory: ''
    model_profile: swarm
    tools:
    - searxng_search
    - webpage_fetch
    allow_delegation: false
    verbose: true
  minor_festival_researcher:
    role: Search for minor music festivals in Hungary 2026
    goal: Identify all minor music festivals with under 1000 attendees
    backstory: ''
    model_profile: swarm
    tools:
    - searxng_search
    - webpage_fetch
    allow_delegation: false
    verbose: true
  regional_festival_researcher:
    role: Search festivals by Hungarian regions and cities
    goal: Ensure geographic coverage across all Hungarian regions
    backstory: ''
    model_profile: swarm
    tools:
    - searxng_search
    - webpage_fetch
    allow_delegation: false
    verbose: true
  detail_verification_agent:
    role: Verify dates, prices, and lineups from official sources
    goal: Extract accurate details from official festival websites and PDFs
    backstory: ''
    model_profile: swarm
    tools:
    - searxng_search
    - webpage_fetch
    - pdf_fetch
    - pdf_extract
    allow_delegation: false
    verbose: true
  coverage_auditor:
    role: Audit completeness and find missing festivals
    goal: Check for gaps in coverage and validate all festivals are captured
    backstory: ''
    model_profile: clever
    tools:
    - searxng_search
    - webpage_fetch
    allow_delegation: false
    verbose: true
  synthesis_agent:
    role: Produce final structured festival list
    goal: Merge all findings into comprehensive formatted output
    backstory: ''
    model_profile: cloud_fast
    tools: []
    allow_delegation: false
    verbose: true
tasks:
  search_major_festivals:
    description: Search the web for major music festivals in Hungary 2026 with {topic}
    expected_output: A concise, structured result.
    agent: major_festival_researcher
    async_execution: true
  search_medium_festivals:
    description: Search the web for medium music festivals in Hungary 2026 with {topic}
    expected_output: A concise, structured result.
    agent: medium_festival_researcher
    async_execution: true
  search_minor_festivals:
    description: Search the web for minor music festivals in Hungary 2026 with {topic}
    expected_output: A concise, structured result.
    agent: minor_festival_researcher
    async_execution: true
  search_regional_festivals:
    description: Search for music festivals by Hungarian regions and cities for {topic}
    expected_output: A concise, structured result.
    agent: regional_festival_researcher
    async_execution: true
  verify_festival_details:
    description: Verify dates, ticket prices, and major bands from official sources
    expected_output: A concise, structured result.
    agent: detail_verification_agent
    context:
    - search_major_festivals
    - search_medium_festivals
    - search_minor_festivals
    - search_regional_festivals
    async_execution: true
  audit_coverage:
    description: Check for missing festivals and validate coverage completeness
    expected_output: A concise, structured result.
    agent: coverage_auditor
    context:
    - verify_festival_details
    - search_major_festivals
    - search_medium_festivals
    - search_minor_festivals
    - search_regional_festivals
  synthesize_final_output:
    description: Produce final structured list of all Hungarian music festivals 2026
    expected_output: A concise, structured result.
    agent: synthesis_agent
    context:
    - audit_coverage
