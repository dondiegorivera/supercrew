services:
  crewai:
    build: .
    image: local/crewai-litellm:1.10.0
    container_name: crewai-litellm-test
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /workspace
    volumes:
      - ./:/workspace
    env_file:
      - .env
    entrypoint: ["python", "supercrew.py"]
    environment:
      HOME: "/tmp/crewai-home"
      XDG_DATA_HOME: "/tmp/crewai-home/.local/share"
      XDG_CACHE_HOME: "/tmp/crewai-home/.cache"
      XDG_CONFIG_HOME: "/tmp/crewai-home/.config"
      AGENT_MESH_LLM_DEBUG: "1"
      AGENT_MESH_LLM_DEBUG_DIR: "/workspace/logs/llm_debug"
      OUTPUT_DIR: "/workspace/outputs"
